apiVersion: example.com/v1
kind: FedDeployment
metadata:
  labels:
    example.com/managed-by: deploytask
    example.com/feddeploy-name: issue5-kvstore-by-fed-deploy
    example.com/inference-service-name: issue5-kvstore-by-fed-deploy
    example.com/model-name: issue5-model
    example.com/platform: TEST
  name: issue5-kvstore-mooncake
  namespace: default
spec:
  minReadySeconds: 30
  replicas: 1
  selector:
    matchLabels:
      example.com/feddeploy-name: issue5-kvstore-by-fed-deploy
      example.com/inference-service-name: issue5-kvstore-by-fed-deploy
      example.com/model-name: issue5-model
      example.com/platform: TEST
  strategy:
    canary:
      maxSurge: 100%
      maxUnavailable: 100%
      steps:
      - pause: {}
        setWeight: 100
  template:
    metadata:
      annotations:
        example.com/update-by-job: "0"

      labels:
        example.com/feddeploy-name: issue5-kvstore-by-fed-deploy
        example.com/inference-service-name: issue5-kvstore-by-fed-deploy
        example.com/model-name: issue5-model
        example.com/platform: TEST
    spec:
      replicas: 1
      template:
        metadata:
          labels:
            example.com/feddeploy-name: issue5-kvstore-by-fed-deploy
            example.com/inference-service-name: issue5-kvstore-by-fed-deploy
            example.com/model-name: issue5-model
            example.com/platform: TEST
          annotations:
            scheduling.volcano.sh/queue-name: <volcano-queue>
        spec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                    - 192.0.2.101
                    - 192.0.2.102
                    - 192.0.2.103
                    - 192.0.2.104
                    - 192.0.2.105
                    - 192.0.2.106
                    - 192.0.2.107
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                    - key: rdma-test
                      operator: In
                      values:
                        - "true"
                  topologyKey: "kubernetes.io/hostname"
 
          containers:
            # 容器只拉起并 idle, 不在启动时跑存储服务。
            # 实际启动逻辑放在 scripts/start_kvstore.sh, 进 pod 后手动执行:
            #   kubectl exec -it <pod> -- bash
            #   MC_PROTOCOL=rdma MC_SEGMENT_SIZE=200gb bash /mnt/cluster/issue5/start_kvstore.sh
          - args:
            - -c
            - |
              . ~/.bashrc
              echo "[issue5-kvstore] Pod ready. Exec in and run scripts/start_kvstore.sh manually."
              tail -f /dev/null
            command:
            - /bin/sh
            # 容器只 idle, 存储服务(mooncake_master + store_service)由
            # scripts/start_kvstore.sh 手动执行, 该脚本 export 自己的 MC_* / PATH / HOST_IP,
            # 且本节点不跑模型, 故此处删除全部 sglang/MoE/kunlun 调优变量,
            # 仅保留 downward-API pod 元信息, 方便 exec 进 pod 调试。
            env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            image: inference-sglang:<image-tag>
            imagePullPolicy: IfNotPresent
            lifecycle:
              preStop:
                exec:
                  command:
                  - /bin/sh
                  - -c
                  - |
                    pkill -9 -f 'mooncake' || true
            name: model-server
            ports:
            - containerPort: 6677
              protocol: TCP
            - containerPort: 8000
              protocol: TCP
            resources:
              limits:
                kunlunxin.com/xpu: "8"  
                rdma/hca: "1"
              requests:
                kunlunxin.com/xpu: "8"  
                rdma/hca: "1"
            securityContext:
              capabilities:
                add:
                - SYS_PTRACE
                - SYS_ADMIN
              runAsUser: 0
            volumeMounts:
            - mountPath: /dev/shm
              name: shm-cache
            - mountPath: /mnt/cluster
              name: pvc-model
          dnsPolicy: ClusterFirst
          hostNetwork: true
          nodeSelector:
            example.com/dedicated-pool: <dedicated-pool>
          restartPolicy: Always
          schedulerName: volcano
          securityContext: {}
          shareProcessNamespace: true
          terminationGracePeriodSeconds: 600
          volumes:
          - emptyDir:
              medium: Memory
              sizeLimit: 32Gi
            name: local-cache
          - emptyDir:
              medium: Memory
              sizeLimit: 800Gi
            name: shm-cache
          - emptyDir: {}
            name: shared-volume
          - name: pvc-model
            persistentVolumeClaim:
              claimName: model-pvc
      # topologyKey: example.com/dcn-tor
      # topologyKeyExclusive: true